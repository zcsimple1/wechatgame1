<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运抽签 - 界面预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
        'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .container {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .content {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .section {
      margin-bottom: 15px;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e0e0e0;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .option-input {
      flex: 1;
      height: 40px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .weight-input {
      width: 80px;
      height: 40px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .add-btn {
      width: 70px;
      height: 40px;
      line-height: 40px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .add-btn:hover {
      background: #45a049;
    }

    .tip {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .options-list {
      max-height: 200px;
    }

    .option-item {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 8px;
      border-left: 2px solid #667eea;
    }

    .option-index {
      width: 25px;
      height: 25px;
      line-height: 25px;
      text-align: center;
      background: #667eea;
      color: white;
      border-radius: 50%;
      font-size: 12px;
      font-weight: bold;
      margin-right: 8px;
    }

    .option-name {
      flex: 1;
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    .option-weight {
      font-size: 12px;
      color: #666;
      margin-right: 10px;
    }

    .option-probability {
      font-size: 12px;
      color: #4CAF50;
      font-weight: bold;
      margin-right: 10px;
    }

    .delete-btn {
      width: 25px;
      height: 25px;
      line-height: 25px;
      text-align: center;
      background: #ff4757;
      color: white;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      border: none;
    }

    .empty-tip {
      text-align: center;
      padding: 30px 0;
      color: #999;
      font-size: 14px;
    }

    .result-section {
      text-align: center;
      padding: 20px 0;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      border-radius: 8px;
      margin-top: 15px;
    }

    .result-title {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
    }

    .result-value {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .close-result-btn {
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
      border: none;
      border-radius: 15px;
      padding: 5px 15px;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .share-btn,
    .draw-btn {
      flex: 1;
      height: 45px;
      line-height: 45px;
      border-radius: 23px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .share-btn {
      background: #fff;
      color: #667eea;
      border: 1px solid #667eea;
    }

    .share-btn:hover {
      background: #f8f9fa;
    }

    .draw-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
    }

    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .preview-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="preview-badge">界面预览</div>
  <div class="container">
    <div class="title">🎲 幸运抽签</div>

    <div class="content">
      <div class="section">
        <div class="section-title">添加选项</div>
        <div class="input-row">
          <input class="option-input" placeholder="输入选项名称" id="optionInput" />
          <input class="weight-input" type="number" placeholder="权重(可选)" id="weightInput" />
          <button class="add-btn" onclick="addOption()">添加</button>
        </div>
        <div class="tip">权重为空时默认为1，权重越大被抽中概率越高</div>
      </div>

      <div class="section">
        <div class="section-title">
          选项列表 (共 <span id="optionCount">0</span> 个)
        </div>
        <div class="options-list" id="optionsList">
          <div class="empty-tip">
            请添加至少2个选项
          </div>
        </div>
      </div>

      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-title">🎉 抽签结果</div>
        <div class="result-value" id="resultValue"></div>
        <button class="close-result-btn" onclick="closeResult()">关闭</button>
      </div>
    </div>

    <div class="actions">
      <button class="share-btn" id="shareBtn" onclick="alert('此功能仅在小程序中可用')">生成分享页</button>
      <button class="draw-btn" id="drawBtn" onclick="startDraw()">开始抽签</button>
    </div>
  </div>

  <script>
    let options = [];
    let isDrawing = false;

    function addOption() {
      const nameInput = document.getElementById('optionInput');
      const weightInput = document.getElementById('weightInput');

      const name = nameInput.value.trim();
      const weight = weightInput.value ? parseInt(weightInput.value) : 1;

      if (!name) {
        alert('请输入选项名称');
        return;
      }

      if (weight < 1) {
        alert('权重必须大于等于1');
        return;
      }

      options.push({
        name: name,
        weight: weight
      });

      nameInput.value = '';
      weightInput.value = '';

      renderOptions();
    }

    function deleteOption(index) {
      options.splice(index, 1);
      renderOptions();
    }

    function calculateProbabilities() {
      const totalWeight = options.reduce((sum, opt) => sum + opt.weight, 0);
      options.forEach(opt => {
        opt.probability = ((opt.weight / totalWeight) * 100).toFixed(1);
      });
    }

    function renderOptions() {
      calculateProbabilities();
      const container = document.getElementById('optionsList');
      const countSpan = document.getElementById('optionCount');
      const drawBtn = document.getElementById('drawBtn');
      const shareBtn = document.getElementById('shareBtn');

      countSpan.textContent = options.length;
      drawBtn.disabled = options.length < 2;
      shareBtn.disabled = options.length < 2;

      if (options.length === 0) {
        container.innerHTML = '<div class="empty-tip">请添加至少2个选项</div>';
        return;
      }

      container.innerHTML = options.map((opt, index) => `
        <div class="option-item">
          <div class="option-index">${index + 1}</div>
          <div class="option-name">${opt.name}</div>
          <div class="option-weight">权重: ${opt.weight}</div>
          <div class="option-probability">概率: ${opt.probability}%</div>
          <button class="delete-btn" onclick="deleteOption(${index})">✕</button>
        </div>
      `).join('');
    }

    function startDraw() {
      if (options.length < 2) {
        alert('请至少添加2个选项');
        return;
      }

      if (isDrawing) return;

      isDrawing = true;
      const drawBtn = document.getElementById('drawBtn');
      const resultSection = document.getElementById('resultSection');
      const resultValue = document.getElementById('resultValue');

      drawBtn.textContent = '抽签中...';
      drawBtn.disabled = true;
      resultSection.style.display = 'block';

      let count = 0;
      const maxCount = 20;

      const interval = setInterval(() => {
        const randomIndex = Math.floor(Math.random() * options.length);
        resultValue.textContent = options[randomIndex].name;

        count++;
        if (count >= maxCount) {
          clearInterval(interval);
          finalDraw();
        }
      }, 100);
    }

    function finalDraw() {
      const totalWeight = options.reduce((sum, opt) => sum + opt.weight, 0);
      let random = Math.random() * totalWeight;

      let result = '';
      for (const opt of options) {
        random -= opt.weight;
        if (random <= 0) {
          result = opt.name;
          break;
        }
      }

      const resultValue = document.getElementById('resultValue');
      const drawBtn = document.getElementById('drawBtn');

      resultValue.textContent = result;

      isDrawing = false;
      drawBtn.textContent = '开始抽签';
      drawBtn.disabled = false;
    }

    function closeResult() {
      const resultSection = document.getElementById('resultSection');
      resultSection.style.display = 'none';
    }

    // 添加示例选项
    options = [
      { name: '麦当劳', weight: 1 },
      { name: '肯德基', weight: 1 },
      { name: '必胜客', weight: 2 }
    ];
    renderOptions();
  </script>
</body>
</html>
